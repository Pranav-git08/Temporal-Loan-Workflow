name: Temporal Loan Workflow CI
on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov
      - name: Run Unit Tests with Coverage
        run: |
          pytest --cov=loan_origination --cov-report=term-missing --cov-fail-under=90 loan_origination/activities/tests/
